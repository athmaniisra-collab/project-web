    <div class="right-part">
        <a href="#home"></a>
        <a href="#seasons"></a>

    <section id="home">
        <!-- MAIN WRAPPER -->
        <div class="wrapper">
            <!-- GLASS CONTAINER -->
            <div class="container card" id="container">
                <!-- LOGIN PANEL -->
                <div class="panel login-panel form-box active" id="loginPanel">
                    <h2>Login</h2>
                    <div id="login-msg" class="msg-box"></div>

                    <form action="auth.php" method="POST" id="loginForm">
                        <input type="hidden" name="action" value="login" />
                        <!--email-->
                        <div class="input-group">
                            <span class="icons"><img src="email.png" width="15px" alt="email"></span>
                            <ion-icon name="mail-outline"></ion-icon>
                            <input type="email" required>
                            <label>Email</label>
                        </div>
                        <!--password-->
                        <div class="input-group">
                            <span class="icons"> <img src="lock.png" width="15px" alt="lock"></span>
                            <input type="password" id="loginPass" required />
                            <label>Password</label>
                        </div>

                        <div class="options">
                            <label><input type="checkbox" name="remember" /> Remember me</label>
                            <a href="#">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn">login</button>
                    </form>

                    <p class="switch">Don't have an account? <a href="#" onclick="switchForm('register')">Register</a>
                    </p>
                </div>

                <!-- VERTICAL DIVIDER -->
                <div class="v-divider"></div>

                <!-- REGISTER PANEL -->
                <div class="panel register-panel form-box" id="registerPanel">

                    <h2>Registration</h2>

                    <div id="register-msg" class="msg-box"></div>

                    <form action="auth.php" method="POST" id="registerForm">
                        <input type="hidden" name="action" value="register" />
                        <!--username-->
                        <div class="input-group">
                            <span class="icons"><img src="user.png" width="15px" alt="user"></span>
                            <input type="text" required />
                            <label>Username</label>
                        </div>
                        <!--email-->
                        <div class="input-group">
                            <span class="icons"><img src="email.png" width="15px" alt="email"></span>
                            <input type="email" required>
                            <label>Email</label>
                        </div>
                        <!--password-->
                        <div class="input-group">
                            <span class="icons"> <img src="lock.png" width="15px" alt="lock"></span>
                            <input type="password" id="regPass" required />
                            <label>Password</label>

                        </div>
                        <!--confirm password-->
                        <div class="input-group">
                            <span class="icons"> <img src="lock.png" width="15px" alt="lock"></span>
                            <input type="password" required />
                            <label> Confirm Password</label>
                        </div>

                        <div class="options">
                            <label><input type="checkbox" name="terms" required /> I agree to the <a href="#">terms
                                    &amp;
                                    conditions</a></label>
                        </div>

                        <button type="submit" class="btn">register</button>
                    </form>

                    <p class="switch">Already have an account? <a href="#" onclick="switchForm('login')">Login</a></p>
                </div>

            </div>
        </div>
    </section>
